<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Submission</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="card">
    <h1>📋 Contact Information</h1>
    <p class="subtitle">Please fill in your details below.</p>

    <form id="contactForm" novalidate>
      <div class="field">
        <label for="full_name">Full Name *</label>
        <input type="text" id="full_name" name="full_name" placeholder="John Doe" required minlength="2">
        <span class="error" id="nameError"></span>
      </div>

      <div class="field">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>
        <span class="error" id="emailError"></span>
      </div>

      <div class="field">
        <label for="id_number">ID / Passport Number *</label>
        <input type="text" id="id_number" name="id_number" placeholder="e.g. 123456789" required minlength="3">
        <span class="error" id="idError"></span>
      </div>

      <div class="field">
        <label for="phone">Phone Number <span class="optional-tag">(optional)</span></label>
        <input type="tel" id="phone" name="phone" placeholder="+27 71 234 5678">
        <span class="error" id="phoneError"></span>
      </div>

      <div class="field">
        <label for="address">Address <span class="optional-tag">(optional)</span></label>
        <textarea id="address" name="address" rows="3" placeholder="Street, City, Country…"></textarea>
        <span class="error" id="addressError"></span>
      </div>

      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="responseBox" class="response-box hidden"></div>
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
