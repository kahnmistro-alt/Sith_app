<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit CV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="card">
    <h1>📄 Submit Your CV</h1>
    <p class="subtitle">Paste your CV in plain text (.txt) format below.</p>

    <form id="cvForm" novalidate>
      <div class="field">
        <label for="cv_text">CV Content *</label>
        <textarea id="cv_text" name="cv_text" rows="12" placeholder="Paste your CV here..."></textarea>
        <span class="error" id="cvError"></span>
      </div>

      <button type="submit" id="submitBtn">Submit CV</button>
    </form>

    <div id="responseBox" class="response-box hidden"></div>
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
